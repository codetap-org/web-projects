<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Swiper Js Carousel with progress animations | CodeTap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://public.codepenassets.com/css/normalize-5.0.0.min.css">
<link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css'><link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <div class="co-carousel-wrap">
  <div class="swiper co-carousel">
    <!-- Additional required wrapper -->
    <div class="swiper-wrapper">
      <!-- Slides -->
      <div class="swiper-slide co-carousel__slide">
        <div class="co-card">
          <div class="co-card__shoe">
            <img
              class="co-card__shoe-img"
              src="https://codocular.com/lab/swiper-carousel/nike1.85b9a747.png"
              alt=""
            />
            <span class="co-card__shoe-shadow"></span>
          </div>
          <div class="co-card__info">
            <div class="co-card__collection text-mask">
              <span>Men's Original</span>
            </div>
            <div class="co-card__title text-mask">
              <span>Nike Air Force</span>
            </div>
            <div class="co-card__price text-mask"><span>$150.00</span></div>
          </div>
        </div>
      </div>
      <div class="swiper-slide co-carousel__slide">
        <div class="co-card co-card--style-1">
          <div class="co-card__shoe">
            <img class="co-card__shoe-img" src="https://codocular.com/lab/swiper-carousel/nike2.3412fa36.png" alt="" />
            <span class="co-card__shoe-shadow"></span>
          </div>
          <div class="co-card__info">
            <div class="co-card__collection text-mask">
              <span>Jordans</span>
            </div>
            <div class="co-card__title text-mask">
              <span>Nike Air Jordan</span>
            </div>
            <div class="co-card__price text-mask"><span>$249.99</span></div>
          </div>
        </div>
      </div>
      <div class="swiper-slide co-carousel__slide">
        <div class="co-card co-card--style-2">
          <div class="co-card__shoe">
            <img class="co-card__shoe-img" src="https://codocular.com/lab/swiper-carousel/nike3.14907490.png" alt="" />
            <span class="co-card__shoe-shadow"></span>
          </div>
          <div class="co-card__info">
            <div class="co-card__collection text-mask">
              <span>Purple Rain</span>
            </div>
            <div class="co-card__title text-mask">
              <span>Nike Air Max</span>
            </div>
            <div class="co-card__price text-mask"><span>$150.00</span></div>
          </div>
        </div>
      </div>
      <div class="swiper-slide co-carousel__slide">
        <div class="co-card co-card--style-3">
          <div class="co-card__shoe">
            <img class="co-card__shoe-img" src="https://codocular.com/lab/swiper-carousel/nike4.62fca82d.png" alt="" />
            <span class="co-card__shoe-shadow"></span>
          </div>
          <div class="co-card__info">
            <div class="co-card__collection text-mask">
              <span>Men's Original</span>
            </div>
            <div class="co-card__title text-mask">
              <span>Nike Air Force</span>
            </div>
            <div class="co-card__price text-mask"><span>$150.00</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="co-carousel__nav-buttons">
    <div class="co-carousel__nav-button prev">
      <span>Prev</span>
    </div>
    <div class="co-carousel__nav-button next">
      <span>Next</span>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="footer-links">
    <a
      href="https://x.com/TimGuignard"
      target="_blank"
      class="co-btn co-btn--link"
      >X</a
    >
    <a
      href="https://codepen.io/TimGuignard/"
      target="_blank"
      class="co-btn co-btn--link"
      >Codepen</a
    >
    <a
      href="https://dribbble.com/TimGuignard"
      target="_blank"
      class="co-btn co-btn--link"
      >Dribbble</a
    >
    <a href="https://codocular.com/" target="_blank" class="co-btn co-btn--link"
      >Codocular</a
    >
	  <a href="https://github.com/TimGuignard/swiper-carousel" target="_blank" class="co-btn co-btn--link">Github</a>
  </div>
</footer>

<div class="co-background co-background--style-0"></div>
<div class="co-background co-background--style-1"></div>
<div class="co-background co-background--style-2"></div>
<div class="co-background co-background--style-3"></div>
    <script type="module" src="./script.js"></script>

  </body>
  
</html>
