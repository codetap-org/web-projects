		</label>
	</div>

			<button class="interaction-btn" data-action="rotate">ROTATION</button>
			<button class="interaction-btn" data-action="swap">ÉCHANGE</button>
			<button class="interaction-btn" data-action="color">COULEUR</button>
		</div>
	</div>

	<div class="reset-btn" id="resetInteractionsBtn" style="margin-top: 8px;">⟲ RÉINITIALISER</div>
</div>

<div class="container" id="container">
