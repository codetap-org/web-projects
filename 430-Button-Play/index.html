<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Button Play</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <div class="container">
  <div class="button-wrapper"><span class="label">Intense Spotlight</span>
    <button class="btn spotlight" data-type="basic"><span>Get Started</span></button>
  </div>
  <div class="button-wrapper"><span class="label">Magnetic Glow</span>
    <button class="btn magnetic" data-type="magnetic"><span>Get Started</span></button>
  </div>
  <div class="button-wrapper"><span class="label">Gradient Shift</span>
    <button class="btn gradient-shift" data-type="gradient"><span>Get Started</span></button>
  </div>
  <div class="button-wrapper"><span class="label">Ripple Effect</span>
    <button class="btn ripple" data-type="magnetic"><span>Get Started</span></button>
  </div>
  <div class="button-wrapper"><span class="label">Glass Reflection</span>
    <button class="btn glass" data-type="basic"><span>Get Started</span></button>
  </div>
  <div class="button-wrapper"><span class="label">Border Light</span>
    <button class="btn border-light" data-type="basic"><span>Get Started</span></button>
  </div>
  <div class="button-wrapper"><span class="label">Particle Trail</span>
    <button class="btn particle" data-type="magnetic"><span>Get Started</span></button>
  </div>
  <div class="button-wrapper"><span class="label">3D Tilt</span>
    <button class="btn tilt" data-type="tilt"><span>Get Started</span></button>
  </div>
  <div class="button-wrapper"><span class="label">Liquid Metal</span>
    <button class="btn liquid" data-type="basic"><span>Get Started</span></button>
  </div>
  <div class="button-wrapper"><span class="label">Neon Pulse</span>
    <button class="btn neon" data-type="basic"><span>Get Started</span></button>
  </div>
  <div class="button-wrapper"><span class="label">Crystalline</span>
    <button class="btn crystalline" data-type="basic"><span>Get Started</span></button>
  </div>
  <div class="button-wrapper"><span class="label">Plasma Flow</span>
    <button class="btn plasma" data-type="basic"><span>Get Started</span></button>
  </div>
</div>
    <script  src="./script.js"></script>

  </body>
  
</html>
