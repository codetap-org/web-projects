<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Gold, - SVG Filter [Editable] | CodeTap</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <!-- Change text here or edit directly on result -->
<div class="text" contenteditable="true">Gold,</div>

<svg id="svg" width="0" height="0" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="f1">
      <feMorphology id="erode" operator="erode" radius="2" />
      <feDropShadow dx="-2" dy="-2" stdDeviation="0" flood-color="#ffdfb4" flood-opacity="1" />
      <feDropShadow dx="4" dy="4" stdDeviation="0" flood-color="#550000" flood-opacity="1" />
      <feMorphology id="dilate" operator="dilate" radius="2" />
    </filter>
  </defs>
</svg>
    <script  src="./script.js"></script>

  </body>
  
</html>
