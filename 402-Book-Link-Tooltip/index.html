<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Book Link Tooltip</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <div class="book-list-container">
      <ul class="book-list">
        <li class="book-item">
          <a href="#" class="book-link" data-number="01">
            <img
              src="https://images.unsplash.com/photo-1544947950-fa07a98d237f?w=200&h=280&fit=crop"
              alt="Book cover"
              class="book-preview"
            />
            The Great Gatsby
            <span class="book-meta">F. Scott Fitzgerald</span>
          </a>
        </li>
        <li class="book-item">
          <a href="#" class="book-link" data-number="02">
            <img
              src="https://images.unsplash.com/photo-1543002588-bfa74002ed7e?w=200&h=280&fit=crop"
              alt="Book cover"
              class="book-preview"
            />
            To Kill a Mockingbird
            <span class="book-meta">Harper Lee</span>
          </a>
        </li>
        <li class="book-item">
          <a href="#" class="book-link" data-number="03">
            <img
              src="https://images.unsplash.com/photo-1512820790803-83ca734da794?w=200&h=280&fit=crop"
              alt="Book cover"
              class="book-preview"
            />
            1984
            <span class="book-meta">George Orwell</span>
          </a>
        </li>
        <li class="book-item">
          <a href="#" class="book-link" data-number="04">
            <img
              src="https://images.unsplash.com/photo-1589829085413-56de8ae18c73?w=200&h=280&fit=crop"
              alt="Book cover"
              class="book-preview"
            />
            Pride and Prejudice
            <span class="book-meta">Jane Austen</span>
          </a>
        </li>
      </ul>
    </div>
    
  </body>
  
</html>
