<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Magnetic Attraction ( drag and drop ) | CodeTap</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <div id="container">
    <div class="mPole" id="mP1">N</div>
    <div class="mPole" id="mP2">S</div>
    <svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
        <g id="tanLine" stroke="none" fill="none">
          <path id="mL0" />
          <circle id="mC0" r="2000" />
          <circle id="mC1" r="2" />
          <circle id="mC2" r="2" />
        </g>
        <g class="magneticLines" stroke="#000000" stroke-width="30" stroke-opacity="1" stroke-dasharray="35 70" stroke-linecap="round" fill="none">
            <path id="mL3" /><path id="mL4" />
            <path id="mL7" /><path id="mL8" />
        </g>
        <g class="magneticLines" stroke="#000000" stroke-width="30" stroke-opacity="1" stroke-dasharray="70 140" stroke-linecap="round" fill="none">
            <path id="mL1" /><path id="mL2" />
            <path id="mL5" /><path id="mL6" />
            <path id="mL9" /><path id="mL10" />
        </g>
    </svg>
    <div id="startBox"></div>
</div>

<blurFilter></blurFilter>

<svg width="0" width="0" role="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="dShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" flood-color="#000" stdDeviation="20" result="shadow"   />
    </filter>
  </defs>
</svg>
    <script src='https://unpkg.com/gsap@3/dist/gsap.min.js'></script>
<script src='https://unpkg.com/gsap@3/dist/Draggable.min.js'></script><script type="module" src="./script.js"></script>

  </body>
  
</html>
