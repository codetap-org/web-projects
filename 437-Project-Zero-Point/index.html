<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">

  <body>
  <!--- Created By: Justin Linwood Ross. Copyright: 2025 --->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT: ZERO-POINT | REDUX</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;500;700&display=swap');

        body {
            margin: 0; overflow: hidden; background-color: #000;
            font-family: 'Rajdhani', sans-serif; color: #aeeeff; user-select: none;
        }

        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }

        /* UI OVERLAY */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none;
            background: radial-gradient(circle at center, transparent 40%, #000510 140%);
        }

        .hud-element { position: absolute; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0, 255, 255, 0.7); }

        .top-left { top: 30px; left: 30px; border-left: 3px solid #00ffff; padding-left: 15px; }
        .top-left h1 { font-size: 28px; margin: 0; font-weight: 700; color: #fff; }
        .top-left p { font-size: 12px; opacity: 0.8; color: cyan; margin-top: 5px; }

        .bottom-right { bottom: 30px; right: 30px; text-align: right; border-right: 3px solid #00ffff; padding-right: 15px; }
        .metric { font-size: 32px; font-weight: 300; }
        .label { font-size: 10px; color: #597d8a; margin-top: 5px; }

        .controls {
            position: absolute; bottom: 30px; left: 30px; pointer-events: auto;
            background: rgba(0, 10, 20, 0.8); padding: 20px; border: 1px solid #00ffff;
            backdrop-filter: blur(5px); z-index: 10;
        }
        
        button {
            background: rgba(0, 255, 255, 0.1); border: 1px solid #00ffff; color: #00ffff;
            padding: 10px 20px; font-family: 'Rajdhani'; font-weight: 700; cursor: pointer;
            transition: all 0.3s; width: 100%; margin-bottom: 10px; letter-spacing: 1px;
        }
        button:hover { background: #00ffff; color: #000; box-shadow: 0 0 15px #00ffff; }

        input[type=range] { width: 100%; margin: 10px 0; accent-color: #00ffff; }

        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 3; opacity: 0.15;
            background: linear-gradient(to bottom, rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%); background-size: 100% 4px;
        }
        
        /* Debug / Loading Overlay */
        #debug-screen {
            position: absolute; top:0; left:0; width:100%; height:100%; background:#000; z-index: 999;
            display:flex; flex-direction:column; justify-content:center; align-items:center; color:cyan;
            font-family: monospace;
        }
        #status-log { color: #00ffff; margin-bottom: 10px; }
        #error-msg { color: #ff3333; margin-top: 10px; max-width: 80%; text-align: center; }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three@0.160.0",
                "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/",
                "cannon-es": "https://esm.sh/cannon-es@0.20.0"
            }
        }
    </script>
</head>
<body>

    <div id="debug-screen">
        <div id="status-log">INITIALIZING CONNECTION...</div>
        <div id="error-msg"></div>
    </div>

    <div id="canvas-container"></div>
    <div class="scanlines"></div>

    <div id="ui-layer">
        <div class="hud-element top-left">
            <h1>PROJECT: ZERO-POINT</h1>
            <p>PHYSICS: STABLE | SYSTEM: ONLINE</p>
        </div>
        
        <div class="controls">
            <div class="label">CORE TEMPERATURE</div>
            <input type="range" id="temp-slider" min="0" max="1" step="0.01" value="0">
            <div class="label" style="display:flex; justify-content:space-between;">
                <span>FROZEN</span><span>MELTDOWN</span>
            </div>
            <br>
            <button id="glitch-btn">TRIGGER INSTABILITY</button>
        </div>

        <div class="hud-element bottom-right">
            <div class="label">ENERGY OUTPUT</div>
            <div class="metric" id="energy-metric">100%</div>
            <div class="label">PARTICLE COUNT</div>
            <div class="metric">2,200</div>
        </div>
    </div>

    <script>
        function logStatus(msg) {
            const el = document.getElementById('status-log');
            if(el) el.innerText = msg;
            console.log(msg);
        }
        function logError(err) {
            const el = document.getElementById('error-msg');
            const status = document.getElementById('status-log');
            if(status) status.style.color = 'red';
            if(status) status.innerText = "SYSTEM FAILURE";
            if(el) el.innerHTML += `<div>${err}</div>`;
        }
        window.onerror = function(msg, url, line) {
            logError(`Error: ${msg} <br> Line: ${line}`);
        };
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { GlitchPass } from 'three/addons/postprocessing/GlitchPass.js';
        import * as CANNON from 'cannon-es';

        logStatus("LIBRARIES LOADED. STARTING ENGINE...");

        let scene, camera, renderer, composer, controls;
        let world, physicsSnow = [], visualSnow;
        let iceCoreMesh, iceCoreBody;
        let glitchPass;
        let meltFactor = 0;
        
        const mouse = new THREE.Vector2();
        const raycaster = new THREE.Raycaster();
        const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0); 
        const mouse3D = new THREE.Vector3(); 

        try {
            init();
        } catch(e) {
            logError(e.message);
        }

        function init() {
            logStatus("BUILDING 3D ENVIRONMENT...");

            // SETUP THREE.JS
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000510, 0.02);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 12);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ReinhardToneMapping;
            container.appendChild(renderer.domElement);

            // SETUP PHYSICS WORLD
            logStatus("INITIALIZING PHYSICS ENGINE...");
            world = new CANNON.World();
            world.gravity.set(0, -1.0, 0); 
            
            // LIGHTING
            const ambient = new THREE.AmbientLight(0x404040, 2);
            scene.add(ambient);
            const pLight = new THREE.PointLight(0x00ffff, 3, 50);
            scene.add(pLight);
            const rimLight = new THREE.DirectionalLight(0xffffff, 4);
            rimLight.position.set(5, 5, 5);
            scene.add(rimLight);

            // CREATE OBJECTS
            createIceCore();
            createPhysicsSnow(200); 
            createVisualSnow(2000); 

            // POST PROCESSING
            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            
            const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            composer.addPass(bloom);

            glitchPass = new GlitchPass();
            glitchPass.enabled = false; 
            composer.addPass(glitchPass);

            // CONTROLS
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
            
            document.getElementById('temp-slider').addEventListener('input', (e) => {
                meltFactor = parseFloat(e.target.value);
            });

            document.getElementById('glitch-btn').addEventListener('click', () => {
                glitchPass.enabled = true;
                setTimeout(() => { glitchPass.enabled = false; }, 1000);
            });

            // SUCCESS
            logStatus("SYSTEM READY.");
            setTimeout(() => {
                document.getElementById('debug-screen').style.display = 'none';
            }, 500);

            animate();
        }

        // CORE 
        function createIceCore() {
            // Physics
            const shape = new CANNON.Sphere(2); 
            iceCoreBody = new CANNON.Body({ mass: 0, material: new CANNON.Material({ friction: 0.1, restitution: 0.5 }) });
            iceCoreBody.addShape(shape);
            world.addBody(iceCoreBody);

            // Visual
            const geometry = new THREE.IcosahedronGeometry(2, 30); 
            
            const material = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    color: { value: new THREE.Color('#00ffff') },
                    meltFactor: { value: 0 },
                    cameraPos: { value: camera.position }
                },
                vertexShader: `
                    varying vec3 vNormal; varying vec3 vPosition;
                    uniform float time; uniform float meltFactor;
                    
                    float hash(float n) { return fract(sin(n) * 1e4); }
                    float noise(vec3 x) {
                        const vec3 step = vec3(110, 241, 171);
                        vec3 i = floor(x); vec3 f = fract(x);
                        float n = dot(i, step);
                        vec3 u = f * f * (3.0 - 2.0 * f);
                        return mix(mix(mix( hash(n + dot(step, vec3(0, 0, 0))), hash(n + dot(step, vec3(1, 0, 0))), u.x),
                                   mix( hash(n + dot(step, vec3(0, 1, 0))), hash(n + dot(step, vec3(1, 1, 0))), u.x), u.y),
                                   mix(mix( hash(n + dot(step, vec3(0, 0, 1))), hash(n + dot(step, vec3(1, 0, 1))), u.x),
                                   mix( hash(n + dot(step, vec3(0, 1, 1))), hash(n + dot(step, vec3(1, 1, 1))), u.x), u.y), u.z);
                    }

                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        float spikes = sin(time * 2.0 + position.y * 4.0) * 0.1;
                        spikes += noise(position * 3.0 + time) * 0.2;
                        float heartbeat = (sin(time * 3.0) * 0.5 + 0.5) * 0.15;
                        float pulse = heartbeat * noise(position * 2.0);
                        float water = sin(time * 3.0 + position.x * 2.0) * 0.05;
                        float finalDisp = mix(spikes + pulse, water, meltFactor);
                        vec3 newPos = position + normal * finalDisp;
                        vPosition = (modelMatrix * vec4(newPos, 1.0)).xyz;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(newPos, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 vNormal; varying vec3 vPosition;
                    uniform vec3 color; uniform vec3 cameraPos; uniform float meltFactor;
                    void main() {
                        vec3 viewDir = normalize(cameraPos - vPosition);
                        vec3 normal = normalize(vNormal);
                        float fresnel = pow(1.0 - dot(viewDir, normal), 3.0);
                        vec3 iceColor = color * 0.5;
                        vec3 waterColor = vec3(0.0, 0.2, 0.5);
                        vec3 edgeColor = vec3(1.0);
                        vec3 base = mix(iceColor, waterColor, meltFactor);
                        vec3 finalColor = mix(base, edgeColor, fresnel * (1.0 - meltFactor * 0.5));
                        gl_FragColor = vec4(finalColor, 0.7 + fresnel * 0.3); 
                    }
                `,
                transparent: true,
                side: THREE.DoubleSide
            });

            iceCoreMesh = new THREE.Mesh(geometry, material);
            scene.add(iceCoreMesh);
        }

        function createPhysicsSnow(count) {
            const geo = new THREE.SphereGeometry(0.1, 4, 4);
            const mat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x555555 });
            
            for(let i=0; i<count; i++) {
                const body = new CANNON.Body({
                    mass: 0.1,
                    shape: new CANNON.Sphere(0.1),
                    linearDamping: 0.1
                });
                resetParticle(body);
                world.addBody(body);
                const mesh = new THREE.Mesh(geo, mat);
                scene.add(mesh);
                physicsSnow.push({ mesh, body });
            }
        }

        function resetParticle(body) {
            const x = (Math.random() - 0.5) * 10;
            const z = (Math.random() - 0.5) * 10;
            body.position.set(x, 10 + Math.random() * 5, z);
            body.velocity.set(0,0,0);
        }

        function createVisualSnow(count) {
            const geo = new THREE.BufferGeometry();
            const pos = [];
            for(let i=0; i<count; i++) {
                pos.push((Math.random()-0.5)*30, (Math.random()-0.5)*30, (Math.random()-0.5)*30);
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            
            const mat = new THREE.PointsMaterial({
                color: 0x88ccff, size: 0.1, transparent: true, opacity: 0.6,
                blending: THREE.AdditiveBlending
            });
            
            visualSnow = new THREE.Points(geo, mat);
            scene.add(visualSnow);
        }

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            raycaster.ray.intersectPlane(plane, mouse3D);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            world.step(1/60, delta, 3);

            iceCoreMesh.rotation.y = time * 0.1;
            iceCoreMesh.material.uniforms.time.value = time;
            iceCoreMesh.material.uniforms.cameraPos.value = camera.position;
            iceCoreMesh.material.uniforms.meltFactor.value = meltFactor;

            physicsSnow.forEach(p => {
                p.mesh.position.copy(p.body.position);
                p.mesh.quaternion.copy(p.body.quaternion);
                if(p.body.position.y < -10) resetParticle(p.body);
                const dist = p.body.position.distanceTo(mouse3D);
                if (dist < 4) {
                    const force = new CANNON.Vec3(p.body.position.x - mouse3D.x, p.body.position.y - mouse3D.y, p.body.position.z - mouse3D.z);
                    force.normalize(); force.scale(8, force);
                    p.body.applyForce(force, p.body.position);
                }
                p.body.applyForce(new CANNON.Vec3(Math.cos(time + p.body.position.y)*0.5, 0, Math.sin(time)*0.5), p.body.position);
            });

            const positions = visualSnow.geometry.attributes.position.array;
            for(let i=0; i<positions.length; i+=3) {
                positions[i+1] -= 0.05; 
                if(positions[i+1] < -15) positions[i+1] = 15;
                positions[i] += Math.cos(time + positions[i+1]) * 0.02;
            }
            visualSnow.geometry.attributes.position.needsUpdate = true;

            controls.update();
            composer.render();
        }
    </script>
</body>
</html>
