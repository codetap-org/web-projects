<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Netflix 80&#39;s</title>
    <link rel="stylesheet" href="https://public.codepenassets.com/css/normalize-5.0.0.min.css">
<link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <!-- Inspired by https://www.instagram.com/reel/DBkFGnLtd4l/ -->
<div class="page">
  <div class="container">
    <div class="logo-wrapper">
      <div class="logo">
        <!--  The ribbon N -->
        <svg class="svg" preserveAspectRatio="none" viewBox="0 0 86 116" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
          <polygon points="0,11 30,73 30,116 0,116" fill="currentColor" />
          <polygon points="0,0 56,116 86,116 30,0" fill="currentColor" />
          <polygon points="56,0 56,43 86,105 86,0" fill="currentColor" />
        </svg>
        <!--    The little bars that slide up over the N to create the rolling effect      -->
        <div class="sliders">
          <div class="slider"></div>
          <div class="slider"></div>
          <div class="slider"></div>
          <div class="slider"></div>
          <div class="slider"></div>
          <div class="slider"></div>
          <div class="slider"></div>
        </div>
      </div>

    </div>
    <!--   Characters in separate elements so I can manually work with letter spacing without kerning and odd browser character calculations that happen with letter-spacing   -->
    <div class="name">
      <div class="letter">N</div>
      <div class="letter">E</div>
      <div class="letter">T</div>
      <div class="letter">F</div>
      <div class="letter">L</div>
      <div class="letter">I</div>
      <div class="letter">X</div>
    </div>
  </div>
</div>
    <script  src="./script.js"></script>

  </body>
  
</html>
