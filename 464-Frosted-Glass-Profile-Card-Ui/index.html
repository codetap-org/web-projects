<!DOCTYPE html>

  <body>
    <div class="user-card">
      <figure class="user-card__media">
        <img
          src="https://images.pexels.com/photos/4850291/pexels-photo-4850291.jpeg"
          alt="Sophie Bennett"
          class="user-card__avatar"
        />
      </figure>
      <div class="user-card__body">
        <div class="user-card__header">
          <h2 class="user-card__name">Woman Name</h2>
          <svg fill="#28bf1b" class="user-card__badge" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><title>check-decagram</title><path d="M23,12L20.56,9.22L20.9,5.54L17.29,4.72L15.4,1.54L12,3L8.6,1.54L6.71,4.72L3.1,5.53L3.44,9.21L1,12L3.44,14.78L3.1,18.47L6.71,19.29L8.6,22.47L12,21L15.4,22.46L17.29,19.28L20.9,18.46L20.56,14.78L23,12M10,17L6,13L7.41,11.59L10,14.17L16.59,7.58L18,9L10,17Z" /></svg>
        </div>

          <div class="user-card__stats">
            <div class="user-card__stat">
              <svg
                fill="#222222"
                width="20"
                height="20"
                xmlns="http://www.w3.org/2000/svg"

            <div class="user-card__stat">
              <svg
                fill="#222222"
                width="20"
                height="20"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"

          </div>
          <div class="user-card__actions">
            <button class="user-card__follow-btn">
              <svg
                fill="#222222"
                width="32"
                height="32"
                xmlns="http://www.w3.org/2000/svg"
