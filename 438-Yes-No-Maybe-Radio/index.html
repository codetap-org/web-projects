<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Yes - No - Maybe</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <fieldsetWrapper id="fw1" data-type="yes">
	<fieldset id="radio-group">
		<legend>Are you ready for a challenge? </legend>

		<div class="card-radio"><label><input type="radio" id="yes" name="answer1" value="yes" checked="checked" />Yes</label></div>
		<div class="card-radio"><label><input type="radio" id="no" name="answer1" value="no" />No</label></div>
		<div class="card-radio"><label><input type="radio" id="maybe" name="answer1" value="maybe" />Maybe</label></div>

	</fieldset>
</fieldsetWrapper>

<fieldsetWrapper id="fw2" data-type="yes">
	<fieldset id="radio-group">
		<legend>Are you ready for a challenge? </legend>

		<div class="card-radio"><label><input type="radio" id="yes2" name="answer2" value="yes" checked="checked" />Yes</label></div>
		<div class="card-radio"><label><input type="radio" id="no2" name="answer2" value="no" />No</label></div>
		<div class="card-radio"><label><input type="radio" id="maybe2" name="answer2" value="maybe" />Maybe</label></div>

	</fieldset>
</fieldsetWrapper>

<div id="bgDivWrapper">
    <div id="bgDivRelative">
        <div id="treyMix"></div>
        <div id="treyBlend"></div>
    </div>
</div>
<div id="bgBlur"></div>
    <script  src="./script.js"></script>

  </body>
  
</html>
