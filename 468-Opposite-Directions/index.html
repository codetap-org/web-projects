<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>March Challenge: Opposite Directions | CodeTap</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <div class="scene" id="scene">
	<div class="road">
		<div class="laneMarkings"></div>
		<div class="medianDash"></div>
	</div>

	<div class="crosswalkZone">
		<div class="crosswalkGrass"></div>
		<div class="crosswalkRoad"></div>
		<div class="dividerLine"></div>
		<div class="sidewalkLeft"></div>
		<div class="sidewalkRight"></div>
	</div>

	<div class="hud">
		<div>Move up/down = traffic flow</div>
		<div>Move left/right = stop & cross</div>
	</div>

	<div class="shadow"></div>
</div>
    <script  src="./script.js"></script>

  </body>
  
</html>
